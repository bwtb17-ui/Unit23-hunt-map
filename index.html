

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wyoming Unit 23 Hunt Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
body{margin:0;font-family:Arial,sans-serif}
#map{height:75vh}
.panel{padding:10px}
button,input{padding:8px;margin:4px}
</style>
</head>
<body>
<div class="panel">
<h3>Unit 23 Hunt Map (Beta)</h3>
<button onclick="locateUser()">Find Me</button>
<input id="name" placeholder="Waypoint name">
<button onclick="saveWaypoint()">Save Waypoint</button>
<button onclick="exportWaypoints()">Export Waypoints</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map=L.map('map').setView([44.5,-105.6],9);

const streetLayer=L.tileLayer(

  'https://tile.openstreetmap.org/{z}/{x}/{y}.png',

  {

    maxZoom:19,

    attribution:'© OpenStreetMap'

  }

);

const satelliteLayer=L.tileLayer(

  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',

  {

    attribution:'© Esri'

  }

);

streetLayer.addTo(map);

L.control.layers(

  {

    "Street":streetLayer,

    "Satellite":satelliteLayer

  }

).addTo(map); 
  
  


  function loadUnit23Boundary() {

  fetch('AntelopeHuntAreas_-6737330874868979965.geojson')

    .then(response => response.json())

    .then(data => {

      const unit23Layer = L.geoJSON(data, {

        filter: function(feature) {

          return feature.properties.HUNTAREA == 23;

        },

        style: {

          color: 'red',

          weight: 4,

          fill: false

        }

      });

      unit23Layer.addTo(map);

      map.fitBounds(unit23Layer.getBounds());

    })

    .catch(error => {

      alert('Boundary load failed');

      console.log(error);

    });

}


function loadPublicLand() {

  fetch('https://gis.blm.gov/wyarcgis/rest/services/Lands/BLM_WY_Surface_Management_Agency/FeatureServer/0/query?where=1%3D1&outFields=*&geometry=-106.2,44.0,-105.2,45.0&geometryType=esriGeometryEnvelope&inSR=4326&spatialRel=esriSpatialRelIntersects&outSR=4326&f=geojson')

    .then(response => response.json())

    .then(data => {

      L.geoJSON(data, {

        style: {

          color: 'yellow',

          weight: 1,

          fillColor: 'yellow',

          fillOpacity: 0.25

        } 

        ,

onEachFeature: function(feature, layer) {

  layer.bindPopup(JSON.stringify(feature.properties));

}

      }).addTo(map);

    });

}


  

  

    

  







  

    

    

  



 
 


let userMarker=null;
let currentPos=null;

function locateUser(){
 navigator.geolocation.getCurrentPosition(function(pos){
   currentPos=[pos.coords.latitude,pos.coords.longitude];
   if(userMarker) map.removeLayer(userMarker);
   userMarker=L.marker(currentPos).addTo(map).bindPopup("Your Location");
   map.setView(currentPos,13);
 },function(e){alert(e.message);});
}

function loadWaypoints(){
 const pts=JSON.parse(localStorage.getItem('unit23wps')||'[]');
 pts.forEach(p=>{
   L.marker([p.lat,p.lon]).addTo(map).on('click', function() {

  let text = p.name;

  if(currentPos){

    const distMeters =

      map.distance(currentPos,[p.lat,p.lon]);

    const distMiles =

      (distMeters / 1609.34).toFixed(2);

    text += '<br>' + distMiles + ' miles away';

  }

  this.unbindPopup();

text += '<br><button onclick="deleteWaypoint(' + p.lat + ',' + p.lon + ')">Delete</button>';

this.bindPopup(text);

this.openPopup();

});
 });
}

function saveWaypoint(){
 if(!currentPos){alert("Get GPS location first."); return;}
 const name=document.getElementById('name').value||'Waypoint';
 const pts=JSON.parse(localStorage.getItem('unit23wps')||'[]');
 pts.push({name:name,lat:currentPos[0],lon:currentPos[1]});
 localStorage.setItem('unit23wps',JSON.stringify(pts));L.marker(currentPos).addTo(map).on('click', function() {

  let text = name;

  if(currentPos){

    const distMeters =

      map.distance(currentPos,currentPos);

    const distMiles =

      (distMeters / 1609.34).toFixed(2);

    text += '<br>' + distMiles + ' miles away';

  }

  this.bindPopup(text).openPopup();

});
}

function exportWaypoints(){
 const data=localStorage.getItem('unit23wps')||'[]';
 const blob=new Blob([data],{type:'application/json'});
 const a=document.createElement('a');
 a.href=URL.createObjectURL(blob);
 a.download='unit23_waypoints.json';
 a.click();
}
map.on('click', function(e) {

  const name = prompt("Waypoint name:");

  if(!name) return;

  const pts = JSON.parse(localStorage.getItem('unit23wps') || '[]');

  pts.push({

    name: name,

    lat: e.latlng.lat,

    lon: e.latlng.lng

  });

  localStorage.setItem('unit23wps', JSON.stringify(pts));

L.marker([p.lat,p.lon]).addTo(map).on('click', function() {

  let text = p.name;

  if(currentPos){

    const distMeters =

      map.distance(currentPos,[p.lat,p.lon]);

    const distMiles =

      (distMeters / 1609.34).toFixed(2);

    text += '<br>' + distMiles + ' miles away';

  }

  this.bindPopup(text).openPopup();

});

    

    

});

  function deleteWaypoint(lat, lon) {

  let pts = JSON.parse(localStorage.getItem('unit23wps') || '[]');

  pts = pts.filter(p => {

    return !(Math.abs(p.lat - lat) < 0.000001 && Math.abs(p.lon - lon) < 0.000001);

  });

  localStorage.setItem('unit23wps', JSON.stringify(pts));

  location.reload();

}
loadWaypoints();
  loadUnit23Boundary();

  loadPublicLand();
</script>
</body>
</html>
